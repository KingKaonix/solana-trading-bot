version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: trading-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - botnet

  redis:
    image: redis:7-alpine
    container_name: trading-bot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - botnet

  # Optional: Redis UI for debugging
  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: trading-bot-redis-ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - botnet
    profiles:
      - debug   # only starts with: docker compose --profile debug up

volumes:
  redis_data:

networks:
  botnet:
    driver: bridge
